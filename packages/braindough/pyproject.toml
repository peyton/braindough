[project]
name = "braindough"
version = "0.1.0"
description = "Local-first brain-modeling experiment harness."
readme = "../../README.md"
requires-python = ">=3.12"
license = "Unlicense"
dependencies = [
  "h5py>=3.15.1",
  "imageio>=2.37.2",
  "imageio-ffmpeg>=0.6.0",
  "matplotlib>=3.10.8",
  "numpy>=2.2.6",
  "pillow>=11.0.0,<12.0.0",
  "pyyaml>=6.0.3",
]

[project.scripts]
braindough = "braindough.cli:main"

[project.optional-dependencies]
tribe = [
  "tribev2 @ git+https://github.com/facebookresearch/tribev2.git@72399081ed3f1040c4d996cefb2864a4c46f5b8e",
]

[build-system]
requires = ["uv_build>=0.11.11,<0.12.0"]
build-backend = "uv_build"
